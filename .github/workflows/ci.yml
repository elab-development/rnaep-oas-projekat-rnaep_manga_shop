# CI — keep the monorepo green (issue 14, PRD phase 13).
#
# On every push and pull request this pipeline installs with pnpm, then runs
# lint + type-check + build + the per-service integration suites, and — in
# parallel — verifies every service Dockerfile still builds. Turborepo caching
# (the `.turbo` dir) is restored so unchanged packages are skipped between runs.
#
# Two independent jobs run concurrently:
#   verify  — lint, typecheck, build, test (Node/pnpm on the runner)
#   docker  — a matrix that builds each app's image (no push)
#
# Integration tests spin up their own ephemeral Postgres/Mongo/Kafka via
# testcontainers (see each app's test/*.e2e-spec.ts + kafka-harness.ts); the
# GitHub-hosted ubuntu runner ships Docker, so no service containers are wired
# here. The root `test` script pins `turbo test --concurrency=1` so the three
# throwaway Kafka brokers never boot at once (commit 5a86815).

name: CI

on:
  push:
    branches: [develop, main, master]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · typecheck · build · test
    runs-on: ubuntu-latest
    # Serial testcontainers (concurrency=1) plus first-run image pulls are slow;
    # give the whole quality gate generous headroom.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # pnpm before setup-node so `cache: pnpm` can find the store. Version is
      # read from the root package.json `packageManager` field (pnpm@10.33.4).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Restore Turborepo's local cache so unchanged tasks are replayed, not
      # rerun. Keyed by commit with a prefix fallback to the latest prior run.
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # Per-service integration suites; testcontainers provisions the databases
      # and Kafka broker each needs. Root script already pins --concurrency=1.
      - name: Test
        run: pnpm test

  docker:
    name: Docker build · ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # One broken Dockerfile shouldn't hide the state of the others.
      fail-fast: false
      matrix:
        # The five NestJS services plus the Next.js web frontend.
        app: [auth, catalog, orders, payments, gateway, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build from the repo root (the Dockerfiles need the whole pnpm workspace)
      # without pushing — this only proves the image still builds. The GitHub
      # Actions layer cache skips unchanged layers on reruns.
      - name: Build ${{ matrix.app }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
