# Prometheus scrape config (slice 01 baseline).
#
# The services do not expose /metrics yet — that lands in slice 12
# (observability). For now Prometheus scrapes itself so the container boots with
# a valid config; the per-service jobs are declared so slice 12 only has to add
# the metrics endpoints, not the wiring.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: services
    metrics_path: /metrics
    static_configs:
      - targets:
          - "gateway:3000"
          - "auth:3001"
          - "catalog:3002"
          - "orders:3003"
          - "payments:3004"
