# Manga Web Shop — full local stack (slice 01 scaffold).
#
# Brings up the five NestJS services, a database per service (Postgres for
# auth/orders/payments, Mongo for catalog), Kafka, Prometheus, and Grafana, each
# as its own container (ADR-0001). Slice 01 only proves "everything boots": each
# service exposes a /health endpoint used as its container healthcheck.
#
#   docker compose up --build
#
# Then verify health (see README): every service should report {"status":"ok"}.

x-jwt-secret: &jwt-secret "dev-insecure-jwt-secret-change-me"

services:
  # ---- Databases -----------------------------------------------------------
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-orders:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
      POSTGRES_DB: orders
    volumes:
      - postgres-orders-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payments:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: payments
      POSTGRES_DB: payments
    volumes:
      - postgres-payments-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments -d payments"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Messaging -----------------------------------------------------------
  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/bitnami/kafka

  # ---- Services ------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    environment:
      PORT: "3000"
      JWT_SECRET: *jwt-secret
      AUTH_URL: "http://auth:3001"
      CATALOG_URL: "http://catalog:3002"
      ORDERS_URL: "http://orders:3003"
      PAYMENTS_URL: "http://payments:3004"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    environment:
      PORT: "3001"
      JWT_SECRET: *jwt-secret
      DATABASE_URL: "postgres://auth:auth@postgres-auth:5432/auth"
    ports:
      - "3001:3001"
    depends_on:
      postgres-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog:
    build:
      context: .
      dockerfile: apps/catalog/Dockerfile
    environment:
      PORT: "3002"
      JWT_SECRET: *jwt-secret
      MONGODB_URI: "mongodb://mongo:27017/catalog"
    ports:
      - "3002:3002"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  orders:
    build:
      context: .
      dockerfile: apps/orders/Dockerfile
    environment:
      PORT: "3003"
      JWT_SECRET: *jwt-secret
      DATABASE_URL: "postgres://orders:orders@postgres-orders:5432/orders"
    ports:
      - "3003:3003"
    depends_on:
      postgres-orders:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  payments:
    build:
      context: .
      dockerfile: apps/payments/Dockerfile
    environment:
      PORT: "3004"
      JWT_SECRET: *jwt-secret
      DATABASE_URL: "postgres://payments:payments@postgres-payments:5432/payments"
    ports:
      - "3004:3004"
    depends_on:
      postgres-payments:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Observability -------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3030:3000"
    depends_on:
      - prometheus

volumes:
  postgres-auth-data:
  postgres-orders-data:
  postgres-payments-data:
  mongo-data:
  kafka-data:
  grafana-data:
